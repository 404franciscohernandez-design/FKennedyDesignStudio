<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Personalización</title>
  <style>
    #preview {
      border: 1px solid #ccc;
      width: 300px;
      height: 300px;
      margin-top: 20px;
      transition: background-color 0.5s ease; /* Animación suave */
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      animation: fadeIn 0.5s ease; /* Animación modal */
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.9);}
      to {opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>
  <h1>Personalización</h1>
  
  <!-- Opciones -->
  <label>Color del objeto:</label>
  <input type="color" id="colorPicker">

  <button id="applyChanges">Aplicar cambios</button>
  
  <!-- Vista previa -->
  <div id="preview"></div>
  
  <!-- Ventana modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <p>El objeto está cambiando de color...</p>
      <button id="closeModal">Cerrar</button>
    </div>
  </div>

  <script>
    const preview = document.getElementById("preview");
    const modal = document.getElementById("modal");
    const colorPicker = document.getElementById("colorPicker");
    
    document.getElementById("applyChanges").addEventListener("click", () => {
      modal.style.display = "flex";
      preview.style.backgroundColor = colorPicker.value;
    });

    document.getElementById("closeModal").addEventListener("click", () => {
      modal.style.display = "none";
    });
  </script>
</body>
</html>
